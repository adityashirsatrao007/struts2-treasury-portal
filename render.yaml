services:
  - type: web
    name: struts2-treasury-portal
    runtime: docker
    plan: free
    region: ohio
    envVars:
      - key: PORT
        value: 7860
      - key: STRUTS_DEV_MODE
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: struts2-db
          property: connectionString
    healthCheckPath: /login.jsp

databases:
  - name: struts2-db
    plan: free
    region: ohio
