# JPMC Treasury Portal Configuration
app.name=JPMC Treasury Portal
app.version=1.0.0
app.env=development

# Database Configuration
db.driver=org.h2.Driver
db.url=jdbc:h2:./testdb;AUTO_SERVER=TRUE
db.username=sa
db.password=

# Hibernate Settings
hibernate.dialect=org.hibernate.dialect.H2Dialect
hibernate.hbm2ddl.auto=validate
hibernate.show_sql=false
hibernate.format_sql=true

# HikariCP Settings
hikaricp.minimumIdle=5
hikaricp.maximumPoolSize=20
hikaricp.idleTimeout=300000
hikaricp.connectionTimeout=20000

# Security Settings
security.session.timeout=15
security.bcrypt.cost=12
