<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JPMC Treasury Portal - Documentation</title>
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <meta name="description" content="Forensic Documentation for JPMC Treasury Portal">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">
</head>
<body>
  <div id="app">Loading Forensic Data...</div>
  <script>
    window.$docsify = {
      name: 'JPMC Treasury Portal',
      repo: 'https://github.com/adityashirsatrao007/struts2-treasury-portal',
      loadSidebar: true,
      subMaxLevel: 2,
      coverpage: false,
      auto2top: true,
      search: 'auto',
      themeColor: '#004a99' // JPMC Navy Blue
    }
  </script>
  <!-- Docsify v4 -->
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
</body>
</html>
